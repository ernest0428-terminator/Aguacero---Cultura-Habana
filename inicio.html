<!DOCTYPE html>

    <!-- Menú lateral -->

                <li class="menu-item menu-item-dropdown" id="categoriasDropdown">
                    <a href="#" class="menu-link" id="categoriasBtn">

                        <span>Categorías</span>
                        <img class="dropdown-light" src="resources/icons_light/chevron-down.png" alt="dropdown">
                        <img class="dropdown-dark" src="resources/icons_dark/chevron-down.png" alt="dropdown" style="display:none;">
                    </a>
                    <ul class="sub-menu" id="submenuCategorias">

                        <li><a href="#" class="sub-menu-link" data-categoria="Cine">Cine</a></li>
                        <li><a href="#" class="sub-menu-link" data-categoria="Exposiciones">Exposiciones</a></li>
                        <li><a href="#" class="sub-menu-link" data-categoria="Danza">Danza</a></li>
                        <li><a href="#" class="sub-menu-link" data-categoria="Libros">Libros</a></li>
                        <li><a href="#" class="sub-menu-link" data-categoria="Festival">Festival</a></li>
                        <li><a href="#" class="sub-menu-link" data-categoria="Infantiles">Infantiles</a></li>
                        <li><a href="#" class="sub-menu-link" data-categoria="Deportes">Deportes</a></li>
                        <li><a href="#" class="sub-menu-link" data-categoria="Talleres">Talleres</a></li>

                    </ul>
                </li>
                <li class="menu-item">
                    <a href="calendario.html" class="menu-link">
                        <img class="calendar-light" src="resources/icons_light/calendar-alt.png" alt="calendario">
                        <img class="calendar-dark" src="resources/icons_dark/calendar-alt.png" alt="calendario" style="display:none;">
                        <span>Calendario</span>
                    </a>
                </li>
                <li class="menu-item">
                    <a href="mapa.html" class="menu-link">
                        <img class="map-light" src="resources/icons_light/map.png" alt="mapa">
                        <img class="map-dark" src="resources/icons_dark/map.png" alt="mapa" style="display:none;">
                        <span>Mapa</span>

                <li class="menu-item" id="menuPromocion" style="display: none;">

    <!-- Contenido principal -->
    <div class="main-content" id="mainContent">
        <div id="contenedor-listas-inicio">
            <div class="loading-spinner">Cargando eventos...</div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
    <script>
        // ==================== SOLO FUNCIONES ESPECÍFICAS DE INICIO ====================
        
        function renderizarInicio() {
            const container = document.getElementById('contenedor-listas-inicio');
            const eventos = getEventosFuturos();
            
            const hoy = new Date();
            hoy.setHours(0, 0, 0, 0);
            const dentroDe7Dias = new Date();
            dentroDe7Dias.setDate(hoy.getDate() + 7);
            const eventosSemana = eventos.filter(e => new Date(e.fechaInicio) >= hoy && new Date(e.fechaInicio) <= dentroDe7Dias);
            
            const eventosPorCategoria = {};
            eventos.forEach(e => {
                if (!eventosPorCategoria[e.categoria]) eventosPorCategoria[e.categoria] = [];
                eventosPorCategoria[e.categoria].push(e);
            });
            
            for (let cat in eventosPorCategoria) {
                eventosPorCategoria[cat].sort((a,b) => new Date(a.fechaInicio) - new Date(b.fechaInicio));
            }
            
            let html = '';
            
            html += `<div class="lista-horizontal-container"><h2>Esta semana</h2><div class="lista-horizontal">`;
            if (eventosSemana.length === 0) {
                html += '<div class="loading-spinner">No hay eventos esta semana</div>';
            } else {
                html += eventosSemana.map(e => `
                    <div class="evento-card-inicio" onclick="window.location.href='detallesEvento.html?id=${e.id}'">
                        <img class="evento-poster" src="${e.poster}" onerror="this.src='https://picsum.photos/id/100/400/300'">
                        <div class="evento-info-inicio">
                            <h4>${e.nombre.length > 30 ? e.nombre.substring(0,27)+'...' : e.nombre}</h4>
                            <p class="fecha">${formatFechaShort(e.fechaInicio)} ${e.horaInicio ? '· ' + e.horaInicio.substring(0,5) : ''}</p>
                        </div>
                    </div>
                `).join('');
            }
            html += `</div></div>`;
            
            const ordenCategorias = ['Conciertos', 'Farándula', 'Teatro', 'Cine', 'Exposiciones', 'Danza', 'Libros', 'Festival', 'Talleres'];
            for (const cat of ordenCategorias) {
                if (eventosPorCategoria[cat] && eventosPorCategoria[cat].length > 0) {
                    html += `<div class="lista-horizontal-container"><h2>${cat}</h2><div class="lista-horizontal">`;
                    html += eventosPorCategoria[cat].map(e => `
                        <div class="evento-card-inicio" onclick="window.location.href='detallesEvento.html?id=${e.id}'">
                            <img class="evento-poster" src="${e.poster}" onerror="this.src='https://picsum.photos/id/100/400/300'">
                            <div class="evento-info-inicio">
                                <h4>${e.nombre.length > 30 ? e.nombre.substring(0,27)+'...' : e.nombre}</h4>
                                <p class="fecha">${formatFechaShort(e.fechaInicio)} ${e.horaInicio ? '· ' + e.horaInicio.substring(0,5) : ''}</p>
                            </div>
                        </div>
                    `).join('');
                    html += `</div></div>`;
                }
            }
            
            container.innerHTML = html || '<div class="loading-spinner">No hay eventos disponibles</div>';
        }
        
        // Inicializar solo la parte de inicio (el resto ya lo hace script.js)
        renderizarInicio();
    </script>
</body>
</html>
