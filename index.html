<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cultura Habana | Eventos culturales en La Habana</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .landing-container {
            min-height: 100vh;
            background: var(--color-bg);
        }
        
        .navbar-landing {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: var(--color-surface);
            box-shadow: 0 2px 10px var(--shadow-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .logo-area {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .logo-area img {
            height: 45px;
        }
        
        .logo-area h1 {
            font-size: 1.5rem;
            color: rgb(2, 90, 138);
        }
        
        .nav-buttons {
            display: flex;
            gap: 1rem;
        }
        
        .btn-outline {
            padding: 0.5rem 1.2rem;
            border: 2px solid rgb(2, 90, 138);
            background: transparent;
            color: rgb(2, 90, 138);
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        
        .btn-outline:hover {
            background: rgb(2, 90, 138);
            color: white;
        }
        
        .btn-primary-landing {
            padding: 0.5rem 1.2rem;
            background: rgb(2, 90, 138);
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        
        .btn-primary-landing:hover {
            background: rgb(2, 110, 168);
            transform: translateY(-2px);
        }
        
        .hero {
            text-align: center;
            padding: 3rem 2rem;
            background: linear-gradient(135deg, rgba(2,90,138,0.1) 0%, rgba(2,90,138,0.05) 100%);
        }
        
        .hero h1 {
            font-size: 2.5rem;
            color: var(--color-text-primary);
            margin-bottom: 1rem;
        }
        
        .hero p {
            font-size: 1.1rem;
            color: var(--color-text-secondary);
            max-width: 600px;
            margin: 0 auto;
        }
        
        .section-title {
            font-size: 1.5rem;
            margin: 2rem 1rem 1rem;
            color: var(--color-text-primary);
            border-left: 4px solid rgb(2, 90, 138);
            padding-left: 1rem;
        }
        
        .eventos-destacados {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
            padding: 0 1rem 2rem;
        }
        
        .evento-destacado-card {
            background: var(--color-surface);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 12px var(--shadow-border);
        }
        
        .evento-destacado-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 24px var(--shadow-border);
        }
        
        .evento-destacado-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        
        .evento-info-landing {
            padding: 1rem;
        }
        
        .evento-info-landing h3 {
            font-size: 1rem;
            margin-bottom: 0.3rem;
            color: var(--color-text-primary);
        }
        
        .evento-info-landing .fecha {
            font-size: 0.8rem;
            color: var(--color-text-secondary);
        }
        
        .evento-info-landing .categoria-badge {
            display: inline-block;
            background: rgb(2, 90, 138);
            color: white;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-top: 0.5rem;
        }
        
        @media (max-width: 600px) {
            .navbar-landing {
                flex-direction: column;
                gap: 1rem;
                padding: 1rem;
            }
            .hero h1 {
                font-size: 1.8rem;
            }
            .eventos-destacados {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="landing-container">
        <nav class="navbar-landing">
            <div class="logo-area">
                <img src="resources/aguacero_cuba_logo_trasnparente.png" alt="Logo" onerror="this.src='https://picsum.photos/id/100/50/50'">
                <h1>Cultura Habana</h1>
            </div>
            <div class="nav-buttons">
                <a href="login.html" class="btn-outline">Iniciar sesión</a>
                <a href="registro.html" class="btn-primary-landing">Registrarse</a>
            </div>
        </nav>
        
        <div class="hero">
            <h1>🎭 Descubre la cultura en La Habana</h1>
            <p>Conciertos, teatro, cine, exposiciones y mucho más. Encuentra los mejores eventos culturales en tu ciudad.</p>
        </div>
        
        <h2 class="section-title">✨ Próximos eventos destacados</h2>
        <div id="eventos-destacados" class="eventos-destacados">
            <div class="loading-spinner">Cargando eventos...</div>
        </div>
        
        <div style="text-align: center; padding: 2rem;">
            <a href="inicio.html" class="btn-primary-landing" style="padding: 0.8rem 2rem;">Ver todos los eventos →</a>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        function cargarEventosDestacados() {
            const container = document.getElementById('eventos-destacados');
            const eventos = getEventosFuturos();
            
            if (eventos.length === 0) {
                container.innerHTML = '<p>No hay eventos próximos</p>';
                return;
            }
            
            container.innerHTML = eventos.slice(0, 8).map(evento => `
                <div class="evento-destacado-card" onclick="window.location.href='detallesEvento.html?id=${evento.id}'">
                    <img src="${evento.poster}" alt="${evento.nombre}" onerror="this.src='https://picsum.photos/id/100/400/300'">
                    <div class="evento-info-landing">
                        <h3>${evento.nombre}</h3>
                        <p class="fecha">📅 ${new Date(evento.fechaInicio).toLocaleDateString('es-ES', { day: 'numeric', month: 'short' })}</p>
                        <span class="categoria-badge">${evento.categoria}</span>
                    </div>
                </div>
            `).join('');
        }
        
        cargarEventosDestacados();
    </script>
</body>
</html>
