<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Cultura Habana</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--color-bg);
            padding: 2rem;
        }
        .auth-card {
            background: var(--color-surface);
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 40px var(--shadow-border);
        }
        .auth-card h1 {
            text-align: center;
            margin-bottom: 0.5rem;
            color: rgb(2, 90, 138);
        }
        .auth-card .subtitle {
            text-align: center;
            color: var(--color-text-secondary);
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--color-text-primary);
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid var(--color-border);
            border-radius: 12px;
            background: var(--color-bg);
            color: var(--color-text-primary);
            font-size: 1rem;
        }
        .phone-container {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .phone-prefix {
            width: 70px;
            padding: 0.8rem;
            background: var(--color-bg);
            border: 1px solid var(--color-border);
            border-radius: 12px;
            color: var(--color-text-primary);
            font-weight: 500;
            text-align: center;
        }
        .phone-number {
            flex: 1;
            padding: 0.8rem;
            border: 1px solid var(--color-border);
            border-radius: 12px;
            background: var(--color-bg);
            color: var(--color-text-primary);
            font-size: 1rem;
        }
        .phone-number:focus {
            outline: none;
            border-color: rgb(2, 90, 138);
        }
        .btn-register {
            width: 100%;
            padding: 0.8rem;
            background: rgb(2, 90, 138);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }
        .btn-register:hover {
            background: rgb(2, 110, 168);
            transform: translateY(-2px);
        }
        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--color-text-secondary);
        }
        .login-link a {
            color: rgb(2, 90, 138);
            text-decoration: none;
            font-weight: 600;
        }
        .error-message {
            background: rgba(220, 53, 69, 0.1);
            color: #dc3545;
            padding: 0.8rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            text-align: center;
        }
        .success-message {
            background: rgba(40, 167, 69, 0.1);
            color: #28a745;
            padding: 0.8rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>🎭 Cultura Habana</h1>
            <p class="subtitle">Crea tu cuenta y disfruta de más funciones</p>
            
            <div id="message"></div>
            
            <form id="register-form">
                <div class="form-group">
                    <label>Nombre completo *</label>
                    <input type="text" id="nombre" required autocomplete="name">
                </div>
                <div class="form-group">
                    <label>Correo electrónico *</label>
                    <input type="email" id="email" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label>Teléfono</label>
                    <div class="phone-container">
                        <span class="phone-prefix">+53</span>
                        <input type="tel" id="telefono" class="phone-number" placeholder="5XXXXXXXX" maxlength="8" pattern="[0-9]{8}" title="8 dígitos del número de teléfono">
                    </div>
                    <small style="color: var(--color-text-secondary); font-size: 0.7rem;">8 dígitos (ejemplo: 51234567)</small>
                </div>
                <div class="form-group">
                    <label>Tipo de cuenta *</label>
                    <select id="rol">
                        <option value="usuario">Usuario (asistir a eventos)</option>
                        <option value="organizador">Organizador (promocionar eventos)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Contraseña *</label>
                    <input type="password" id="password" required autocomplete="new-password" minlength="4">
                </div>
                <div class="form-group">
                    <label>Confirmar contraseña *</label>
                    <input type="password" id="confirm_password" required autocomplete="new-password">
                </div>
                <button type="submit" class="btn-register">Registrarme</button>
            </form>
            
            <div class="login-link">
                ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
            </div>
            <div class="login-link">
                <a href="inicio.html">← Continuar sin registrar</a>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        // Verificar si ya hay sesión activa
        if (getUsuarioActual()) {
            window.location.href = 'inicio.html';
        }
        
        document.getElementById('register-form').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            
            if (password !== confirmPassword) {
                mostrarMensaje('Las contraseñas no coinciden', 'error');
                return;
            }
            
            if (password.length < 4) {
                mostrarMensaje('La contraseña debe tener al menos 4 caracteres', 'error');
                return;
            }
            
            let telefonoCompleto = '';
            const telefonoNum = document.getElementById('telefono').value.trim();
            if (telefonoNum) {
                if (!/^\d{8}$/.test(telefonoNum)) {
                    mostrarMensaje('El teléfono debe tener 8 dígitos', 'error');
                    return;
                }
                telefonoCompleto = '+53 ' + telefonoNum;
            }
            
            const usuario = {
                nombre: document.getElementById('nombre').value.trim(),
                email: document.getElementById('email').value.trim(),
                telefono: telefonoCompleto,
                rol: document.getElementById('rol').value,
                password: password
            };
            
            const resultado = registrarUsuario(usuario);
            
            if (resultado.exito) {
                // Iniciar sesión automáticamente después del registro
                iniciarSesion(usuario.email, usuario.password);
                mostrarMensaje('¡Registro exitoso! Redirigiendo al inicio...', 'success');
                setTimeout(() => {
                    window.location.href = 'inicio.html';
                }, 1500);
            } else {
                mostrarMensaje(resultado.mensaje, 'error');
            }
        });
        
        function mostrarMensaje(mensaje, tipo) {
            const messageDiv = document.getElementById('message');
            messageDiv.className = tipo === 'error' ? 'error-message' : 'success-message';
            messageDiv.textContent = mensaje;
            messageDiv.style.display = 'block';
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 3000);
        }
        
        // Validar solo números en el campo de teléfono
        document.getElementById('telefono').addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '').slice(0, 8);
        });
    </script>
</body>
</html>
